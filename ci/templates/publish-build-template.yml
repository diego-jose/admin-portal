parameters:
  artifactStagingDirectory: ""
  buildId: ""
  buildOutputFolder: ""

steps:
  - task: CopyFiles@2
    inputs:
      contents: ${{parameters.buildOutputFolder}}
      targetFolder: $(Build.ArtifactStagingDirectory)

  - task: ArchiveFiles@2
    displayName: "Archive the files into a zip file for publishing"
    inputs:
      rootFolderOrFile: ${{parameters.artifactStagingDirectory}}
      archiveType: "zip"
      archiveFile: "${{parameters.artifactStagingDirectory}}/${{parameters.buildId}}.zip"
      includeRootFolder: true

  - task: PublishBuildArtifacts@1
    displayName: "Publish the zip file"
    inputs:
      pathtoPublish: "${{parameters.artifactStagingDirectory}}/${{parameters.buildId}}.zip"
